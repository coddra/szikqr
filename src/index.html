<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="SZIK-es QR-kód generátor">
  <meta property="og:description" content="Generálj QR-kódokat SZIK-es logóval vagy anélkül - gyorsan és egyszerűen.">
  <meta property="og:image" content="https://szqr.hu/assets/preview.png">
  <meta property="og:url" content="https://szqr.hu/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="hu_HU">

  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>SZIK-es QR-kód generátor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script type="module" src="script/main.js"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-purple-600 to-blue-500">
  <main class="flex-grow flex flex-col md:items-center md:justify-center p-4">
    <div class="bg-stone-50 rounded-xl shadow-2xl p-8 w-full max-w-4xl flex flex-col md:flex-row gap-8">
      <div class="flex-1">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">
          SZIK-es és nem SZIK-es QR-kód generátor
        </h1>

        <div class="mb-4">
          <label for="qr-content" class="block text-gray-700 text-sm font-semibold mb-2">
            URL vagy szöveg:
          </label>
          <input type="text" name="qr-code-content" id="qr-content" value="" placeholder="https://example.com"
            autocomplete="off"
            class="w-full p-3 border border-gray-300 rounded-lg focus:directions-none focus:ring-2 focus:ring-blue-400 text-gray-800" />
        </div>

        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center">
            <input id="includeLogo" type="checkbox" class="mr-2" checked>
            <label for="includeLogo" class="text-sm text-gray-700">Logó megjelenítése</label>
          </div>
          <select id="shape" class="border border-gray-300 rounded-lg text-sm px-2 py-1">
            <option value="8" selected>kerek</option>
            <option value="1">tompa</option>
            <option value="0">szögletes</option>
          </select>
        </div>

        <div class="flex flex-col mb-6">
          <span class="block text-gray-700 text-sm font-semibold mb-2">
            Színbeállítások:
          </span>
          <div class="flex justify-around">
            <div class="flex items-center space-x-2">
              <label for="bg-cpicker" class="text-sm text-gray-700">Háttér:</label>
              <input id="bg-cpicker" type="color" value="#FFFFFF" class="w-8 h-8 rounded cursor-pointer">
            </div>
            <div class="flex items-center space-x-2">
              <label for="qr-cpicker" class="text-sm text-gray-700">QR:</label>
              <input id="qr-cpicker" type="color" value="#000000" class="w-8 h-8 rounded cursor-pointer">
            </div>
            <div class="flex items-center space-x-2">
              <label for="logo-cpicker" class="text-sm text-gray-700">Logó:</label>
              <input id="logo-cpicker" type="color" value="#B7182E" class="w-8 h-8 rounded cursor-pointer">
            </div>
          </div>
        </div>

        <button type="submit" id="generateButton"
          class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300 ease-in-out focus:directions-none focus:ring-2 focus:ring-blue-400 disabled:opacity-50 disabled:cursor-not-allowed">
          QR-kód generálása
        </button>
      </div>

      <div class="flex-1 md:border-l md:pl-8 border-gray-200">
        <div id="errorMessage" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm hidden">
        </div>

        <div id="qrCodeDisplay" class="text-center">
          <div id="qr-code" class="flex justify-center">
            <img src="./assets/preview.png" alt="QR-kód" class="rounded-xl shadow-xl border border-gray-300">
          </div>
          <p class="mt-4 text-sm text-gray-600">
            Mentéshez jobbklikk a QR-kódra
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="w-full bg-black text-white text-sm px-3 py-1 z-50">
    <div class="flex justify-end items-center gap-2">
      <span>
        made with ❤️ by
      </span>
      <a href="https://github.com/coddra"
        class="flex items-center group gap-2 transition duration-100 hover:drop-shadow-[0_0_3px_rgba(255,255,255,0.7)]">
        <span class="font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
          coddra
        </span>

        <div class="relative w-8 h-5">
          <img src="./assets/github-logo.png" class="absolute right-0 bottom-0 w-5 h-5">

          <img src="https://avatars.githubusercontent.com/u/91418192?v=4"
            class="absolute right-3 bottom-0 w-5 h-5 rounded-full border border-black bg-black">
        </div>
      </a>
    </div>
  </footer>
</body>

</html>
